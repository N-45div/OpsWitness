[OpsWitness - Verify Deployment Regression]
description = Organization-approved detection for a service error regression after deployment.
search = search index=$index$ earliest=-60m service="$service$" (level="error" OR status>=500) | bin _time span=5m | stats count AS errors by _time | eventstats avg(errors) AS baseline stdev(errors) AS sigma | eval detected=if(errors > baseline + (2*sigma), "true", "false") | where detected="true" | sort - _time
dispatch.earliest_time = -60m
dispatch.latest_time = now
is_visible = 1

[OpsWitness - Verify Credential Attack]
description = Organization-approved detection for distributed authentication failures.
search = search index=$index$ earliest=-60m service="$service$" (action="login_failed" OR status=401 OR status=403) | bin _time span=5m | stats count AS failures dc(src_ip) AS source_ips by _time | eventstats avg(failures) AS baseline stdev(failures) AS sigma | eval detected=if(failures > baseline + (2*sigma), "true", "false") | where detected="true" | sort - _time
dispatch.earliest_time = -60m
dispatch.latest_time = now
is_visible = 1

[OpsWitness - Verify Queue Saturation]
description = Organization-approved detection for queue growth and worker latency.
search = search index=$index$ earliest=-60m service="$service$" (queue_depth>0 OR duration_ms>0) | bin _time span=5m | stats max(queue_depth) AS queue_depth p95(duration_ms) AS p95_latency by _time | eventstats avg(queue_depth) AS baseline stdev(queue_depth) AS sigma | eval detected=if(queue_depth > baseline + (2*sigma), "true", "false") | where detected="true" | sort - _time
dispatch.earliest_time = -60m
dispatch.latest_time = now
is_visible = 1

[OpsWitness - Seed Service Policy]
description = Seeds the OpsWitness service policy KV Store collection.
search = | inputlookup opswitness_service_policy_seed.csv | outputlookup opswitness_service_policy_lookup
is_visible = 1

