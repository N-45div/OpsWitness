[opswitness_service_policy_lookup]
external_type = kvstore
collection = opswitness_service_policy
fields_list = _key, service, criticality, owner, allowed_actions, requires_approval, soar_playbook

[opswitness_response_playbooks_lookup]
external_type = kvstore
collection = opswitness_response_playbooks
fields_list = _key, scenario, playbook, description, enabled

[opswitness_model_feedback_lookup]
external_type = kvstore
collection = opswitness_model_feedback
fields_list = _key, run_id, model_name, classification, accepted, reviewer, reviewed_at
